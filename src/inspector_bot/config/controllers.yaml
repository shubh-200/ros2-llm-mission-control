controller_manager:
  ros__parameters:
    update_rate: 100  # Hz - The frequency of the main control loop

    # Declare the controller names and map them to their C++ types
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    linear:
      x:
        has_velocity_limits    : true
        max_velocity           : 1.5   # m/s
        min_velocity           : -1.5  # m/s
        has_acceleration_limits: true
        max_acceleration       : 2.0   # m/s^2
        max_jerk               : 5.0   # m/s^3
    angular:
      z:
        has_velocity_limits    : true
        max_velocity           : 2.5   # rad/s
        has_acceleration_limits: true
        max_acceleration       : 3.2   # rad/s^2
    # Joint Mapping
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # Kinematics Math Parameters 
    wheel_separation: 0.36  # chassis_width (0.3) + (wheel_length (0.04) * 2) + (wheel_ygap (0.02) * 2)
    wheel_radius: 0.1

    # Odometry Configuration
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: true
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]

    # Remap or expose standard command topic
    publish_rate: 50.0  # Hz
    cmd_vel_timeout: 0.5 # Stop the robot if cmd_vel drops out for > 0.5s
    use_stamped_vel: false # Set to false to accept standard geometry_msgs/Twist