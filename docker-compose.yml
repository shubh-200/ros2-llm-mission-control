version: '3.8'

services:
  # Service 1: Simulation + Nav2 stack
  inspector_stack:
    build: .
    container_name: inspector_autonomy_container
    # Connect to the host network for seamless DDS discovery and GUI rendering
    network_mode: "host"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      # Mount the X11 socket to allow Gazebo and RViz to render on your host machine
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Optional: Mount your source code directly for live-editing Python launch files without rebuilding the container
      - ./src:/ros2_ws/src:rw
      # Detection snapshots — images saved here are visible on the host immediately
      - ./detections:/ros2_ws/detections:rw
    # Launch the entire orchestrator immediately upon boot
    # To run explore mode, override this with: ros2 launch inspector_bot explore_bringup.launch.py
    command: ros2 launch inspector_bot master_bringup.launch.py

  # Service 2: LLM bridge — interactive terminal for mission prompts
  llm_bridge:
    build: .
    container_name: inspector_llm_container
    network_mode: "host"
    stdin_open: true   # keeps stdin open for input()
    tty: true          # allocates a pseudo-TTY for the prompt
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - GEMINI_API_KEY=${GEMINI_API_KEY}   # passed from host shell
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./src:/ros2_ws/src:rw
      # Persist saved missions outside the container
      - ./missions:/ros2_ws/missions:rw
      # Persist detection snapshots on the host
      - ./detections:/ros2_ws/detections:rw
    depends_on:
      - inspector_stack
    command: ros2 run inspector_llm llm_bridge